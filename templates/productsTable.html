<div class="bg-white/40 backdrop-blur-md my-12 p-6 rounded-2xl shadow-xl">

    <h2 class="text-2xl text-purple-600 font-semibold mb-4">
        Lista de Productos
    </h2>

    <table class="w-full text-gray-800 text-left">
        <thead>
            <tr class="border-b border-purple-200 text-purple-600">
                <th class="p-3">ID</th>
                <th class="p-3">Nombre</th>
                <th class="p-3">Categoría</th>
                <th class="p-3">Stock</th>
            </tr>
        </thead>

        <tbody>
            {% for p in products %}
            <tr class="hover:bg-purple-100 transition">
                <td class="p-3">{{ p.id }}</td>
                <td class="p-3">{{ p.name }}</td>
                <td class="p-3">{{ p.category.name }}</td>
                <td class="p-3 font-semibold">{{ p.stock }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center p-3 text-gray-500">No hay productos</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
