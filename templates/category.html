{% extends "base.html" %}

{% block content %}

<div class="max-w-5xl mx-auto">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold">Categorías</h1>

        <button class="btn btn-sm bg-black text-white hover:bg-gray-800"
                onclick="document.getElementById('modal-category').showModal()">
            + Nueva categoría
        </button>
    </div>

    <!-- Tabla -->
    <div class="bg-base-100 border border-base-300 rounded-xl shadow-sm overflow-hidden">
        <table class="table w-full">
            <thead class="bg-base-200">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                </tr>
            </thead>
            <tbody>
                {% for category in categories %}
                <tr class="hover">
                    <td>{{ forloop.counter }}</td>
                    <td>{{ category.name }}</td>
                    <td>{{ category.description }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-base-content/60 py-6">
                        No hay categorías registradas
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

<dialog id="modal-category" class="modal">
    <div class="modal-box">

        <h3 class="font-bold text-lg mb-4">Nueva categoría</h3>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name"
                   placeholder="Nombre de la categoría"
                   class="input input-bordered w-full mb-4"
                   required>

            <div class="flex justify-end gap-2">
                <button type="button" class="btn"
                        onclick="document.getElementById('modal-category').close()">
                    Cancelar
                </button>

                <button type="submit" class="btn bg-black text-white">
                    Guardar
                </button>
            </div>
        </form>

    </div>
</dialog>

{% endblock %}
