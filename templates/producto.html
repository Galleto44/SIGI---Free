{% extends "base.html" %}

{% block title%}Producto{% endblock %}

{% block content %}

<div class="flex flex-col items-center gap-6">
    
    <div class="bg-white/80 backdrop-blur-md p-8 rounded-2xl shadow-xl w-full max-w-md">

        <h2 class="text-2xl font-semibold text-purple-700 mb-6 text-center">
            Registrar Producto
        </h2>

        <form method="POST" class="space-y-5" action="{% url 'crear_producto' %}">
            {% csrf_token %}

            <div>
                <label class="block text-gray-700 mb-2">Nombre</label>
                <input type="text" name="nombre"
                    class="w-full px-4 py-2 rounded-xl border border-purple-200"
                    placeholder="Ej: Gloss"
                    required>
            </div>

            <div>
                <label class="block text-gray-700 mb-2">Categoría</label>
                <select name="categoria"
                    class="w-full px-4 py-2 rounded-xl border border-purple-200"
                    required>

                    {% for c in categorias %}
                        <option value="{{ c.id }}">{{ c.nombre }}</option>
                    {% endfor %}

                </select>
            </div>

            <div>
                <label class="block text-gray-700 mb-2">Stock</label>
                <input type="number" name="stock" value="0" min="0"
                    class="w-full px-4 py-2 rounded-xl border border-purple-200">
            </div>

            <button type="submit"
                class="w-full bg-purple-400 hover:bg-purple-500 text-white font-semibold py-3 rounded-xl transition transform hover:scale-105">
                Guardar Producto
            </button>

        </form>
    </div>

    <a href="{% url 'home' %}">
            <button class="bg-pink-400 hover:bg-pink-500 text-white text-lg font-semibold px-8 py-4 rounded-2xl shadow-lg transform transition duration-300 hover:scale-105 hover:shadow-2xl">
                volver
            </button>
        </a>

</div>

{% endblock %}
